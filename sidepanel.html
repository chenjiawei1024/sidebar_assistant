<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AI Sidebar</title>
  <link rel="stylesheet" href="sidepanel.css">
</head>
<body>
  <div class="app-container">
    <!-- Header -->
    <header class="header">
      <div class="logo">
        <svg class="logo-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <rect x="3" y="3" width="18" height="18" rx="4"/>
          <path d="M8 12h8"/>
          <path d="M12 8v8"/>
        </svg>
        <span class="logo-text">AI Assistant</span>
      </div>
      <button class="settings-btn" id="settingsBtn" title="设置">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <circle cx="12" cy="12" r="3"/>
          <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"/>
        </svg>
      </button>
    </header>

    <!-- Settings Panel -->
    <div class="settings-panel" id="settingsPanel">
      <div class="settings-content">
        <h3 class="settings-title">API 设置</h3>
        <div class="input-group">
          <label class="input-label">API 地址</label>
          <input
            type="text"
            class="input-field"
            id="apiUrlInput"
            placeholder="https://api.openai.com/v1"
          />
          <p class="input-hint">OpenAI 兼容的 API 地址，留空则使用默认地址</p>
        </div>
        <div class="input-group">
          <label class="input-label">API Key</label>
          <input
            type="password"
            class="input-field"
            id="apiKeyInput"
            placeholder="输入你的 API Key"
          />
          <p class="input-hint">API Key 将安全保存在本地浏览器中</p>
        </div>
        <div class="input-group">
          <label class="input-label">模型</label>
          <input
            type="text"
            class="input-field"
            id="modelInput"
            placeholder="Qwen3-Coder-Flash"
          />
          <p class="input-hint">支持任意 OpenAI 兼容格式的模型名称</p>
        </div>
        <div class="btn-group">
          <button class="btn btn-secondary" id="testConnectionBtn">测试连接</button>
          <button class="btn btn-primary" id="saveSettingsBtn">保存设置</button>
        </div>
      </div>
    </div>

    <!-- Chat Container -->
    <div class="chat-container" id="chatContainer">
      <!-- Welcome State -->
      <div class="welcome-state" id="welcomeState">
        <div class="welcome-icon">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
            <path d="M12 2a3 3 0 0 0-3 3v14a3 3 0 0 0 6 0V5a3 3 0 0 0-3-3Z"/>
            <path d="M12 8h.01"/>
          </svg>
        </div>
        <h2 class="welcome-title">有什么可以帮你的？</h2>
        <p class="welcome-subtitle">输入你的问题，让我来为你解答</p>
      </div>

      <!-- Messages -->
      <div class="messages" id="messages"></div>
    </div>

    <!-- Input Area -->
    <div class="input-area">
      <div class="input-wrapper">
        <textarea 
          class="chat-input" 
          id="chatInput" 
          placeholder="输入你的问题..."
          rows="1"
        ></textarea>
        <button class="tool-btn" id="quoteBtn" title="引用页面选中的文本">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M10 13a5 5 0 0 0 7.54.54l3-3a5 5 0 0 0-7.07-7.07l-1.72 1.71"/>
            <path d="M14 11a5 5 0 0 0-7.54-.54l-3 3a5 5 0 0 0 7.07 7.07l1.71-1.71"/>
          </svg>
        </button>
        <button class="send-btn" id="sendBtn" disabled>
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <line x1="22" y1="2" x2="11" y2="13"/>
            <polygon points="22 2 15 22 11 13 2 9 22 2"/>
          </svg>
        </button>
      </div>
      <p class="input-footer">内容由 AI 生成，仅供参考</p>
    </div>
  </div>

  <script src="js/openai.js"></script>
  <script src="js/sidepanel.js"></script>
</body>
</html>
